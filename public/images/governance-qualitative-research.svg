<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="450" fill="#0f172a"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="60" fill="#1e293b"/>
  <text x="32" y="22" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="2">CENTRE FOR GOVERNANCE INSIGHTS · RESEARCH METHODOLOGY</text>
  <text x="32" y="46" fill="#f8fafc" font-size="18" font-weight="700">Governance Research &amp; Somali-English Qualitative Analysis</text>
  <rect x="660" y="16" width="112" height="26" rx="4" fill="#0f766e" opacity="0.9"/>
  <text x="716" y="34" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">2023 – 2025</text>

  <!-- Left: Workflow steps -->
  <rect x="32" y="78" width="240" height="350" rx="6" fill="#1e293b"/>
  <text x="48" y="102" fill="#f1f5f9" font-size="12" font-weight="600">Research Workflow</text>

  <!-- Step 1 -->
  <circle cx="58" cy="130" r="12" fill="#0f766e"/>
  <text x="58" y="135" fill="#fff" font-size="10" font-weight="700" text-anchor="middle">1</text>
  <text x="80" y="127" fill="#cbd5e1" font-size="11" font-weight="600">Survey Tool Design</text>
  <text x="80" y="142" fill="#64748b" font-size="9">KII &amp; FGD guide development</text>
  <line x1="58" y1="142" x2="58" y2="163" stroke="#334155" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Step 2 -->
  <circle cx="58" cy="175" r="12" fill="#0f766e"/>
  <text x="58" y="180" fill="#fff" font-size="10" font-weight="700" text-anchor="middle">2</text>
  <text x="80" y="172" fill="#cbd5e1" font-size="11" font-weight="600">Field Data Collection</text>
  <text x="80" y="187" fill="#64748b" font-size="9">Politically sensitive regions</text>
  <line x1="58" y1="187" x2="58" y2="208" stroke="#334155" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Step 3 - highlighted -->
  <circle cx="58" cy="220" r="12" fill="#7c3aed"/>
  <text x="58" y="225" fill="#fff" font-size="10" font-weight="700" text-anchor="middle">3</text>
  <rect x="72" y="208" width="185" height="36" rx="4" fill="#7c3aed" opacity="0.15"/>
  <text x="80" y="222" fill="#a78bfa" font-size="11" font-weight="700">Somali → English</text>
  <text x="80" y="235" fill="#a78bfa" font-size="9">Transcription &amp; translation · 99% accuracy</text>
  <line x1="58" y1="244" x2="58" y2="265" stroke="#334155" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Step 4 -->
  <circle cx="58" cy="277" r="12" fill="#0f766e"/>
  <text x="58" y="282" fill="#fff" font-size="10" font-weight="700" text-anchor="middle">4</text>
  <text x="80" y="274" fill="#cbd5e1" font-size="11" font-weight="600">Dataset Cleaning</text>
  <text x="80" y="289" fill="#64748b" font-size="9">R · SPSS · Excel · 1,000+ records</text>
  <line x1="58" y1="289" x2="58" y2="310" stroke="#334155" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Step 5 -->
  <circle cx="58" cy="322" r="12" fill="#0f766e"/>
  <text x="58" y="327" fill="#fff" font-size="10" font-weight="700" text-anchor="middle">5</text>
  <text x="80" y="319" fill="#cbd5e1" font-size="11" font-weight="600">NVivo Thematic Coding</text>
  <text x="80" y="334" fill="#64748b" font-size="9">Qualitative analysis &amp; pattern ID</text>
  <line x1="58" y1="334" x2="58" y2="355" stroke="#334155" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Step 6 -->
  <circle cx="58" cy="367" r="12" fill="#0f766e"/>
  <text x="58" y="372" fill="#fff" font-size="10" font-weight="700" text-anchor="middle">6</text>
  <text x="80" y="364" fill="#cbd5e1" font-size="11" font-weight="600">Policy Brief Output</text>
  <text x="80" y="379" fill="#64748b" font-size="9">Evidence-based recommendations</text>

  <!-- Centre: Themes word cloud style -->
  <rect x="288" y="78" width="250" height="350" rx="6" fill="#1e293b"/>
  <text x="304" y="102" fill="#f1f5f9" font-size="12" font-weight="600">Research Themes</text>

  <rect x="304" y="115" width="110" height="26" rx="13" fill="#7c3aed" opacity="0.8"/>
  <text x="359" y="133" fill="#fff" font-size="10" font-weight="600" text-anchor="middle">Anti-Corruption</text>

  <rect x="424" y="115" width="96" height="26" rx="13" fill="#0f766e" opacity="0.8"/>
  <text x="472" y="133" fill="#fff" font-size="10" font-weight="600" text-anchor="middle">PFM Reforms</text>

  <rect x="304" y="152" width="130" height="26" rx="13" fill="#1d4ed8" opacity="0.8"/>
  <text x="369" y="170" fill="#fff" font-size="10" font-weight="600" text-anchor="middle">Transparency &amp; Accountability</text>

  <rect x="445" y="152" width="74" height="26" rx="13" fill="#7c3aed" opacity="0.6"/>
  <text x="482" y="170" fill="#fff" font-size="10" font-weight="600" text-anchor="middle">IFFs</text>

  <rect x="304" y="190" width="90" height="26" rx="13" fill="#0f766e" opacity="0.6"/>
  <text x="349" y="208" fill="#fff" font-size="10" font-weight="600" text-anchor="middle">Governance</text>

  <rect x="404" y="190" width="116" height="26" rx="13" fill="#1d4ed8" opacity="0.7"/>
  <text x="462" y="208" fill="#fff" font-size="10" font-weight="600" text-anchor="middle">Security Policy</text>

  <rect x="304" y="228" width="108" height="26" rx="13" fill="#7c3aed" opacity="0.5"/>
  <text x="358" y="246" fill="#fff" font-size="10" font-weight="600" text-anchor="middle">Asset Recovery</text>

  <rect x="422" y="228" width="98" height="26" rx="13" fill="#0f766e" opacity="0.7"/>
  <text x="471" y="246" fill="#fff" font-size="10" font-weight="600" text-anchor="middle">Field Research</text>

  <!-- Language badge -->
  <rect x="304" y="274" width="210" height="50" rx="6" fill="#7c3aed" opacity="0.15"/>
  <text x="409" y="296" fill="#a78bfa" font-size="13" font-weight="700" text-anchor="middle">🌍 Somali · English · Kiswahili</text>
  <text x="409" y="315" fill="#7c6fbc" font-size="10" text-anchor="middle">Transcription · Translation · Field Research</text>

  <!-- Metrics -->
  <text x="304" y="352" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1">KEY OUTCOMES</text>
  <text x="304" y="372" fill="#34d399" font-size="11">↑ 20%  <tspan fill="#cbd5e1">contextual data accuracy</tspan></text>
  <text x="304" y="390" fill="#34d399" font-size="11">↑ 25%  <tspan fill="#cbd5e1">reporting efficiency</tspan></text>
  <text x="304" y="408" fill="#34d399" font-size="11">99%    <tspan fill="#cbd5e1">transcription accuracy</tspan></text>

  <!-- Right: Engagement donut -->
  <rect x="554" y="78" width="214" height="350" rx="6" fill="#1e293b"/>
  <text x="570" y="102" fill="#f1f5f9" font-size="12" font-weight="600">Participant Engagement</text>

  <!-- Donut chart - 95% -->
  <circle cx="661" cy="185" r="60" fill="none" stroke="#1e3a5f" stroke-width="18"/>
  <circle cx="661" cy="185" r="60" fill="none" stroke="#7c3aed" stroke-width="18"
          stroke-dasharray="356 376" stroke-dashoffset="94" stroke-linecap="round" transform="rotate(-90 661 185)"/>
  <text x="661" y="181" fill="#a78bfa" font-size="22" font-weight="700" text-anchor="middle">95%</text>
  <text x="661" y="198" fill="#64748b" font-size="9" text-anchor="middle">engagement rate</text>

  <!-- Tools used -->
  <text x="570" y="270" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1">TOOLS</text>
  <rect x="570" y="280" width="60" height="20" rx="4" fill="#334155"/>
  <text x="600" y="294" fill="#cbd5e1" font-size="9" text-anchor="middle">NVivo</text>
  <rect x="638" y="280" width="50" height="20" rx="4" fill="#334155"/>
  <text x="663" y="294" fill="#cbd5e1" font-size="9" text-anchor="middle">SPSS</text>
  <rect x="696" y="280" width="50" height="20" rx="4" fill="#334155"/>
  <text x="721" y="294" fill="#cbd5e1" font-size="9" text-anchor="middle">R</text>
  <rect x="570" y="308" width="80" height="20" rx="4" fill="#334155"/>
  <text x="610" y="322" fill="#cbd5e1" font-size="9" text-anchor="middle">SurveyToGo</text>
  <rect x="658" y="308" width="88" height="20" rx="4" fill="#334155"/>
  <text x="702" y="322" fill="#cbd5e1" font-size="9" text-anchor="middle">Excel · KoboToolbox</text>

  <text x="570" y="360" fill="#94a3b8" font-size="10" font-weight="600" letter-spacing="1">PROJECT SCALE</text>
  <text x="570" y="378" fill="#cbd5e1" font-size="10">2–3 projects / year</text>
  <text x="570" y="396" fill="#cbd5e1" font-size="10">1,000+ records analysed</text>
  <text x="570" y="414" fill="#cbd5e1" font-size="10">Multiple East Africa regions</text>
</svg>

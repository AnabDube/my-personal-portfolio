<svg viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif">
  <!-- Background -->
  <rect width="800" height="450" fill="#0f172a"/>

  <!-- Header -->
  <rect x="0" y="0" width="800" height="60" fill="#1e293b"/>
  <text x="32" y="22" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="2">POWER BI · PUBLIC FINANCIAL MANAGEMENT · MULTI-ENTITY MONITORING</text>
  <text x="32" y="46" fill="#f8fafc" font-size="18" font-weight="700">Public Finance Monitoring Dashboard</text>
  <rect x="672" y="16" width="100" height="26" rx="4" fill="#1d4ed8" opacity="0.9"/>
  <text x="722" y="34" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">Power BI</text>

  <!-- Top KPI strip -->
  <rect x="32"  y="75" width="162" height="65" rx="6" fill="#1e293b"/>
  <text x="48"  y="95"  fill="#94a3b8" font-size="9"  font-weight="600" letter-spacing="1">ENTITIES MONITORED</text>
  <text x="48"  y="125" fill="#60a5fa" font-size="30" font-weight="700">10+</text>

  <rect x="204" y="75" width="162" height="65" rx="6" fill="#1e293b"/>
  <text x="220" y="95"  fill="#94a3b8" font-size="9"  font-weight="600" letter-spacing="1">AVG BUDGET UTIL.</text>
  <text x="220" y="125" fill="#34d399" font-size="30" font-weight="700">76%</text>

  <rect x="376" y="75" width="162" height="65" rx="6" fill="#1e293b"/>
  <text x="392" y="95"  fill="#94a3b8" font-size="9"  font-weight="600" letter-spacing="1">ENTITIES FLAGGED</text>
  <text x="392" y="125" fill="#fb923c" font-size="30" font-weight="700">2</text>

  <rect x="548" y="75" width="220" height="65" rx="6" fill="#1e293b"/>
  <text x="564" y="95"  fill="#94a3b8" font-size="9"  font-weight="600" letter-spacing="1">REPORTING PERIODS</text>
  <text x="564" y="125" fill="#a78bfa" font-size="30" font-weight="700">6</text>

  <!-- Left: Stacked bar chart - Revenue vs Expenditure vs Surplus -->
  <rect x="32" y="152" width="360" height="270" rx="6" fill="#1e293b"/>
  <text x="48" y="175" fill="#f1f5f9" font-size="12" font-weight="600">Revenue vs Expenditure Trend</text>
  <text x="48" y="190" fill="#64748b" font-size="9">6 reporting periods · KES Millions (synthetic)</text>

  <!-- Y axis -->
  <line x1="72" y1="200" x2="72" y2="395" stroke="#334155" stroke-width="1"/>
  <line x1="72" y1="395" x2="370" y2="395" stroke="#334155" stroke-width="1"/>

  <!-- Y labels -->
  <text x="68" y="205" fill="#475569" font-size="8" text-anchor="end">800</text>
  <text x="68" y="248" fill="#475569" font-size="8" text-anchor="end">600</text>
  <text x="68" y="291" fill="#475569" font-size="8" text-anchor="end">400</text>
  <text x="68" y="334" fill="#475569" font-size="8" text-anchor="end">200</text>
  <text x="68" y="395" fill="#475569" font-size="8" text-anchor="end">0</text>

  <!-- Grid lines -->
  <line x1="72" y1="248" x2="370" y2="248" stroke="#1e3a5f" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="72" y1="291" x2="370" y2="291" stroke="#1e3a5f" stroke-width="0.5" stroke-dasharray="4,3"/>
  <line x1="72" y1="338" x2="370" y2="338" stroke="#1e3a5f" stroke-width="0.5" stroke-dasharray="4,3"/>

  <!-- Period bars -->
  <!-- P1 -->
  <rect x="85"  y="265" width="18" height="130" rx="2" fill="#7c3aed" opacity="0.85"/>
  <rect x="105" y="280" width="18" height="115" rx="2" fill="#60a5fa" opacity="0.75"/>
  <!-- P2 -->
  <rect x="133" y="255" width="18" height="140" rx="2" fill="#7c3aed" opacity="0.85"/>
  <rect x="153" y="270" width="18" height="125" rx="2" fill="#60a5fa" opacity="0.75"/>
  <!-- P3 -->
  <rect x="181" y="248" width="18" height="147" rx="2" fill="#7c3aed" opacity="0.85"/>
  <rect x="201" y="260" width="18" height="135" rx="2" fill="#60a5fa" opacity="0.75"/>
  <!-- P4 -->
  <rect x="229" y="238" width="18" height="157" rx="2" fill="#7c3aed" opacity="0.85"/>
  <rect x="249" y="252" width="18" height="143" rx="2" fill="#60a5fa" opacity="0.75"/>
  <!-- P5 - flagged overspend -->
  <rect x="277" y="228" width="18" height="167" rx="2" fill="#7c3aed" opacity="0.85"/>
  <rect x="297" y="215" width="18" height="180" rx="2" fill="#fb923c" opacity="0.85"/>
  <text x="306" y="210" fill="#fb923c" font-size="8" text-anchor="middle">⚠</text>
  <!-- P6 -->
  <rect x="325" y="235" width="18" height="160" rx="2" fill="#7c3aed" opacity="0.85"/>
  <rect x="345" y="248" width="18" height="147" rx="2" fill="#60a5fa" opacity="0.75"/>

  <!-- X labels -->
  <text x="103"  y="408" fill="#475569" font-size="8" text-anchor="middle">Q1</text>
  <text x="151"  y="408" fill="#475569" font-size="8" text-anchor="middle">Q2</text>
  <text x="199"  y="408" fill="#475569" font-size="8" text-anchor="middle">Q3</text>
  <text x="247"  y="408" fill="#475569" font-size="8" text-anchor="middle">Q4</text>
  <text x="295"  y="408" fill="#fb923c" font-size="8" text-anchor="middle" font-weight="700">Q5 ⚠</text>
  <text x="343"  y="408" fill="#475569" font-size="8" text-anchor="middle">Q6</text>

  <!-- Legend -->
  <rect x="80"  y="418" width="10" height="8" rx="1" fill="#7c3aed"/>
  <text x="94"  y="426" fill="#94a3b8" font-size="8">Revenue</text>
  <rect x="150" y="418" width="10" height="8" rx="1" fill="#60a5fa"/>
  <text x="164" y="426" fill="#94a3b8" font-size="8">Expenditure</text>
  <rect x="235" y="418" width="10" height="8" rx="1" fill="#fb923c"/>
  <text x="249" y="426" fill="#94a3b8" font-size="8">Overspend flagged</text>

  <!-- Right: Gauge + table -->
  <rect x="404" y="152" width="364" height="130" rx="6" fill="#1e293b"/>
  <text x="420" y="175" fill="#f1f5f9" font-size="12" font-weight="600">Budget Utilisation by Entity</text>

  <!-- Horizontal bar gauges -->
  <text x="420" y="198" fill="#94a3b8" font-size="10">Entity A</text>
  <rect x="490" y="186" width="240" height="14" rx="3" fill="#0f172a"/>
  <rect x="490" y="186" width="195" height="14" rx="3" fill="#34d399" opacity="0.8"/>
  <text x="736" y="198" fill="#34d399" font-size="10">81%</text>

  <text x="420" y="222" fill="#94a3b8" font-size="10">Entity B</text>
  <rect x="490" y="210" width="240" height="14" rx="3" fill="#0f172a"/>
  <rect x="490" y="210" width="168" height="14" rx="3" fill="#34d399" opacity="0.8"/>
  <text x="736" y="222" fill="#34d399" font-size="10">70%</text>

  <text x="420" y="246" fill="#94a3b8" font-size="10">Entity C</text>
  <rect x="490" y="234" width="240" height="14" rx="3" fill="#0f172a"/>
  <rect x="490" y="234" width="240" height="14" rx="3" fill="#fb923c" opacity="0.85"/>
  <text x="736" y="246" fill="#fb923c" font-size="10" font-weight="700">100%+</text>

  <text x="420" y="270" fill="#94a3b8" font-size="10">Entity D</text>
  <rect x="490" y="258" width="240" height="14" rx="3" fill="#0f172a"/>
  <rect x="490" y="258" width="144" height="14" rx="3" fill="#fbbf24" opacity="0.8"/>
  <text x="736" y="270" fill="#fbbf24" font-size="10">60%</text>

  <!-- Bottom right: PFM indicators -->
  <rect x="404" y="292" width="175" height="130" rx="6" fill="#1e293b"/>
  <text x="420" y="315" fill="#f1f5f9" font-size="12" font-weight="600">PFM Indicators</text>
  <text x="420" y="338" fill="#34d399" font-size="11">✓ <tspan fill="#cbd5e1" font-size="10">Revenue concentration</tspan></text>
  <text x="420" y="358" fill="#34d399" font-size="11">✓ <tspan fill="#cbd5e1" font-size="10">Surplus/deficit trend</tspan></text>
  <text x="420" y="378" fill="#34d399" font-size="11">✓ <tspan fill="#cbd5e1" font-size="10">Capital allocation</tspan></text>
  <text x="420" y="398" fill="#fb923c" font-size="11">⚠ <tspan fill="#cbd5e1" font-size="10">Variance audit flag</tspan></text>

  <!-- Bottom right: DAX snippet -->
  <rect x="588" y="292" width="180" height="130" rx="6" fill="#0f172a"/>
  <text x="604" y="315" fill="#94a3b8" font-size="9" font-weight="600">DAX · VARIANCE MEASURE</text>
  <text x="604" y="335" fill="#7c3aed" font-size="9">Variance % =</text>
  <text x="604" y="350" fill="#a78bfa" font-size="8">DIVIDE(</text>
  <text x="614" y="364" fill="#60a5fa" font-size="8">[Actual Expenditure]</text>
  <text x="614" y="378" fill="#64748b" font-size="8">- [Approved Budget],</text>
  <text x="614" y="392" fill="#60a5fa" font-size="8">[Approved Budget]</text>
  <text x="604" y="406" fill="#a78bfa" font-size="8">)</text>
</svg>
